name: CRM API Tests
on:
  push: { branches: [main] }
  schedule: [{ cron: '0 5 * * 1-5' }]
jobs:
  api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: npm test